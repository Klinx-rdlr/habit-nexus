name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      auth-service: ${{ steps.filter.outputs.auth-service }}
      habit-service: ${{ steps.filter.outputs.habit-service }}
      group-service: ${{ steps.filter.outputs.group-service }}
      notification-service: ${{ steps.filter.outputs.notification-service }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway:
              - 'services/gateway/**'
              - 'shared/**'
            auth-service:
              - 'services/auth-service/**'
              - 'shared/**'
            habit-service:
              - 'services/habit-service/**'
              - 'shared/**'
            group-service:
              - 'services/group-service/**'
              - 'shared/**'
            notification-service:
              - 'services/notification-service/**'
              - 'shared/**'
            frontend:
              - 'frontend/**'

  test-service:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.gateway == 'true' ||
      needs.detect-changes.outputs.auth-service == 'true' ||
      needs.detect-changes.outputs.habit-service == 'true' ||
      needs.detect-changes.outputs.group-service == 'true' ||
      needs.detect-changes.outputs.notification-service == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - auth-service
          - habit-service
          - group-service
          - notification-service
        exclude:
          - service: ${{ needs.detect-changes.outputs.gateway != 'true' && 'gateway' || 'skip' }}
          - service: ${{ needs.detect-changes.outputs.auth-service != 'true' && 'auth-service' || 'skip' }}
          - service: ${{ needs.detect-changes.outputs.habit-service != 'true' && 'habit-service' || 'skip' }}
          - service: ${{ needs.detect-changes.outputs.group-service != 'true' && 'group-service' || 'skip' }}
          - service: ${{ needs.detect-changes.outputs.notification-service != 'true' && 'notification-service' || 'skip' }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Lint
        working-directory: services/${{ matrix.service }}
        run: npx tsc --noEmit

      - name: Generate Prisma client
        if: ${{ matrix.service != 'gateway' }}
        working-directory: services/${{ matrix.service }}
        run: npx prisma generate

      - name: Run unit tests
        working-directory: services/${{ matrix.service }}
        run: npm test -- --passWithNoTests

      - name: Run e2e tests
        if: ${{ matrix.service != 'gateway' }}
        working-directory: services/${{ matrix.service }}
        run: npm run test:e2e -- --passWithNoTests

  test-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npx next build

  ci-passed:
    runs-on: ubuntu-latest
    needs: [test-service, test-frontend]
    if: always()
    steps:
      - name: Check job results
        run: |
          if [[ "${{ needs.test-service.result }}" == "failure" || "${{ needs.test-frontend.result }}" == "failure" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI checks passed"
