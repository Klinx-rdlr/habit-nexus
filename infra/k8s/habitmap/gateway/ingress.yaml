apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway-ingress
  namespace: habitmap
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  rules:
    - http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3000
          - path: /habits
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3000
          - path: /groups
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3000
          - path: /notifications
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: gateway
                port:
                  number: 3000
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: gateway
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: habitmap
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 4000
